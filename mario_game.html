<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Super Mario Bros</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; font-family:'Courier New',monospace; overflow:hidden; }
canvas { display:block; image-rendering:pixelated; border:3px solid #444; cursor:pointer; }
#ui { color:#fff; font-size:13px; letter-spacing:1px; margin-bottom:6px; display:flex; gap:30px; }
#msg { color:#ff0; font-size:14px; margin-top:6px; min-height:20px; text-align:center; }
#controls { color:#aaa; font-size:11px; margin-top:6px; text-align:center; line-height:1.6; }
#controls b { color:#fc4; }
#btns { display:flex; gap:10px; margin-top:10px; }
.btn { background:#E89020; border:none; color:#000; font-weight:bold; padding:14px 22px; font-size:16px; border-radius:8px; user-select:none; touch-action:manipulation; }
.btn:active { background:#fc4; }
</style>
</head>
<body>
<div id="ui">
  <span>MARIO</span>
  <span id="score">000000</span>
  <span>🍄 <span id="coins">00</span></span>
  <span>WORLD 1-1</span>
  <span>LIVES: <span id="lives">3</span></span>
  <span>HIGH <span id="highscore">000000</span></span>
</div>
<canvas id="c" width="768" height="432"></canvas>
<div id="msg">CLICK SCREEN TO START — THEN CLICK/SPACE TO JUMP</div>
<div id="controls"><b>← →</b> move &nbsp;|&nbsp; <b>CLICK / SPACE</b> jump &nbsp;|&nbsp; <b>SHIFT</b> run</div>
<div id="btns">
  <button class="btn" id="leftBtn">◀ LEFT</button>
  <button class="btn" id="jumpBtn">⬆ JUMP</button>
  <button class="btn" id="rightBtn">RIGHT ▶</button>
</div>

<script>
const c = document.getElementById('c');
const ctx = c.getContext('2d');
const W=768, H=432, TW=16;

// ===== AUDIO =====
let AC=null;
function ensureAudio(){
  try{ if(!AC) AC=new (window.AudioContext||window.webkitAudioContext)(); if(AC.state==='suspended') AC.resume(); }catch(e){}
}
function beep(freq,type,dur,vol,delay){
  if(!AC) return; delay=delay||0;
  const o=AC.createOscillator(), g=AC.createGain();
  o.connect(g); g.connect(AC.destination);
  o.type=type; o.frequency.value=freq;
  g.gain.setValueAtTime(vol,AC.currentTime+delay);
  g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+delay+dur);
  o.start(AC.currentTime+delay); o.stop(AC.currentTime+delay+dur);
}
function jumpSound(){ beep(330,'square',0.05,0.25); beep(560,'square',0.1,0.25,0.05); }
function coinSound(){ beep(988,'square',0.05,0.25); beep(1318,'square',0.15,0.25,0.05); }
function stompSound(){ beep(180,'square',0.1,0.35); }
function dieSound(){ [400,300,200,100].forEach((f,i)=>beep(f,'square',0.1,0.3,i*0.1)); }
function blockSound(){ beep(220,'square',0.12,0.35); }
function flagSound(){ [523,587,659,698,784,880,988,1047].forEach((f,i)=>beep(f,'square',0.12,0.3,i*0.12)); }
let bgmTimer=null, bgmOn=false;
function playBGM(){
  if(!AC) return; bgmOn=true;
  const notes=[[660,0.1],[660,0.2],[0,0.1],[660,0.2],[0,0.1],[523,0.2],[660,0.2],[0,0.1],[784,0.5],[0,0.5],
    [392,0.5],[0,0.5],[523,0.3],[0,0.3],[392,0.3],[0,0.3],[330,0.3],[0,0.1],
    [440,0.2],[0,0.1],[494,0.2],[0,0.1],[466,0.1],[440,0.2],[0,0.1],[392,0.2],
    [660,0.2],[784,0.2],[880,0.2],[698,0.2],[784,0.1],[0,0.1],
    [660,0.2],[0,0.1],[523,0.2],[0,0.1],[587,0.2],[523,0.4]];
  let t=AC.currentTime+0.05;
  notes.forEach(([f,d])=>{
    if(f>0){
      const o=AC.createOscillator(),g=AC.createGain();
      o.connect(g); g.connect(AC.destination);
      o.type='square'; o.frequency.value=f;
      g.gain.setValueAtTime(0.07,t);
      g.gain.exponentialRampToValueAtTime(0.001,t+d);
      o.start(t); o.stop(t+d+0.01);
    }
    t+=d;
  });
  bgmTimer=setTimeout(()=>{ if(bgmOn) playBGM(); }, (t-AC.currentTime)*1000);
}
function stopBGM(){ bgmOn=false; if(bgmTimer) clearTimeout(bgmTimer); }

// ===== COLORS =====
const COL={sky:'#5C94FC',ground:'#C84C0C',groundTop:'#E89020',brick:'#C84C0C',brickTop:'#E89020',
  qblock:'#E89020',qblockTop:'#FCA044',pipe:'#00A800',pipeLight:'#00D800',mario:'#FC1010',
  marioSkin:'#FCBCB0',marioPants:'#006BB8',marioShoe:'#5C1800',coin:'#FCA044'};

// ===== INPUT (super simple) =====
let moveLeft=false, moveRight=false, runHeld=false, wantJump=false;

function tryStartOrJump(){
  ensureAudio();
  if(gameState==='title' || gameState==='gameover' || gameState==='win'){ startGame(); }
  else if(gameState==='playing'){ wantJump=true; }
}

document.addEventListener('keydown', e=>{
  if(e.code==='ArrowLeft'||e.code==='KeyA') moveLeft=true;
  if(e.code==='ArrowRight'||e.code==='KeyD') moveRight=true;
  if(e.code==='ShiftLeft'||e.code==='ShiftRight') runHeld=true;
  if(e.code==='Space'||e.code==='ArrowUp'||e.code==='KeyW'||e.code==='KeyZ'){ tryStartOrJump(); }
  if(['ArrowLeft','ArrowRight','ArrowUp','Space'].includes(e.code)) e.preventDefault();
});
document.addEventListener('keyup', e=>{
  if(e.code==='ArrowLeft'||e.code==='KeyA') moveLeft=false;
  if(e.code==='ArrowRight'||e.code==='KeyD') moveRight=false;
  if(e.code==='ShiftLeft'||e.code==='ShiftRight') runHeld=false;
});

// Click / tap canvas = jump (and starts game)
c.addEventListener('mousedown', tryStartOrJump);
c.addEventListener('touchstart', e=>{ e.preventDefault(); tryStartOrJump(); }, {passive:false});

// On-screen buttons (mobile friendly + also works on desktop)
const leftBtn=document.getElementById('leftBtn');
const rightBtn=document.getElementById('rightBtn');
const jumpBtn=document.getElementById('jumpBtn');
function bindHold(btn, onDown, onUp){
  btn.addEventListener('mousedown', e=>{ e.preventDefault(); onDown(); });
  btn.addEventListener('mouseup', e=>{ e.preventDefault(); onUp(); });
  btn.addEventListener('mouseleave', onUp);
  btn.addEventListener('touchstart', e=>{ e.preventDefault(); onDown(); }, {passive:false});
  btn.addEventListener('touchend', e=>{ e.preventDefault(); onUp(); }, {passive:false});
}
bindHold(leftBtn, ()=>moveLeft=true, ()=>moveLeft=false);
bindHold(rightBtn, ()=>moveRight=true, ()=>moveRight=false);
jumpBtn.addEventListener('mousedown', e=>{ e.preventDefault(); tryStartOrJump(); });
jumpBtn.addEventListener('touchstart', e=>{ e.preventDefault(); tryStartOrJump(); }, {passive:false});

window.addEventListener('blur', ()=>{ moveLeft=false; moveRight=false; runHeld=false; });
document.addEventListener('visibilitychange', ()=>{
  if(document.hidden){ moveLeft=false; moveRight=false; runHeld=false; wantJump=false; }
  else { last=0; if(AC && AC.state==='suspended') AC.resume(); }
});

// ===== LEVEL =====
const LEVEL_W=200, LEVEL_H=15;
const tiles=new Uint8Array(LEVEL_W*LEVEL_H);
function tIdx(x,y){ return y*LEVEL_W+x; }
function setTile(x,y,v){ if(x>=0&&x<LEVEL_W&&y>=0&&y<LEVEL_H) tiles[tIdx(x,y)]=v; }
function getTile(x,y){
  if(x<0) return 1;
  if(x>=LEVEL_W||y>=LEVEL_H||y<0) return 0;
  return tiles[tIdx(x,y)];
}
function isSolid(t){ return t>=1 && t<=8; }

function buildLevel(){
  tiles.fill(0);
  const gaps=[[30,32],[58,60],[88,91],[118,121]];
  for(let x=0;x<LEVEL_W-8;x++){
    const inGap=gaps.some(([a,b])=>x>=a&&x<=b);
    if(!inGap){ setTile(x,13,1); setTile(x,14,1); }
  }
  const platforms=[
    [6,10,3],[7,10,2],[8,10,3],[11,10,3],
    [16,6,3],[17,6,2],[18,6,2],[19,6,3],
    [22,9,2],[23,6,3],[24,6,2],
    [38,9,2],[39,9,2],[40,9,2],
    [43,6,2],[44,6,2],[45,6,2],[46,6,3],
    [50,9,3],[51,9,2],[52,9,2],
    [64,6,2],[65,6,3],[66,6,2],
    [70,9,2],[71,9,2],[72,9,3],
    [95,9,2],[96,9,3],[97,9,2],
    [100,6,3],[101,6,2],[102,6,2],
    [125,9,2],[126,9,3],[127,9,2],
    [135,6,2],[136,6,3],[137,6,2]
  ];
  platforms.forEach(([x,y,t])=>setTile(x,y,t));
  const pipes=[[14,12],[36,11],[63,10],[85,11],[110,11],[140,10]];
  pipes.forEach(([x,y])=>{
    setTile(x,y,5); setTile(x+1,y,6);
    for(let j=y+1;j<13;j++){ setTile(x,j,7); setTile(x+1,j,8); }
  });
  for(let i=0;i<8;i++) for(let j=i;j<8;j++) setTile(LEVEL_W-16+i,13-j,1);
  for(let x=LEVEL_W-8;x<LEVEL_W-2;x++) for(let y=8;y<13;y++) setTile(x,y,1);
  for(let y=5;y<13;y++) setTile(LEVEL_W-12,y,9);

  enemies=[];
  const ePos=[
    [20,12,0],[26,12,0],[42,12,0],[48,12,0],[55,12,0],[68,12,0],
    [78,12,0],[92,12,0],[105,12,0],[122,12,0],[148,12,0],[160,12,1],
    [65,5,0],[101,5,0],[136,5,0]
  ];
  ePos.forEach(([ex,ey,type])=>{
    enemies.push({x:ex*TW,y:ey*TW,w:14,h:14,vx:-0.7,vy:0,type,alive:true,squished:false,squishTimer:0,frame:0,frameTimer:0,onGround:false});
  });
  particles=[]; coinAnims=[];
  flagY=5*TW; flagAnimating=false; marioOnFlag=false;
}

// ===== STATE =====
let score=0,coins=0,lives=3;
let highScore=0;
try{ highScore=parseInt(localStorage.getItem('marioHighScore')||'0',10)||0; }catch(e){ highScore=0; }
let gameState='title';
let camX=0;
let marioOnFlag=false, flagAnimating=false, flagY=0;
let mario={};
let enemies=[], particles=[], coinAnims=[];
let winTimer=0;

function resetMario(){
  mario={x:48,y:190,vx:0,vy:0,w:14,h:16,onGround:false,facing:1,frame:0,frameTimer:0,invincible:0,dead:false,coyote:0,jumpBuffer:0};
}
function startGame(){
  score=0; coins=0; lives=3;
  buildLevel(); resetMario(); camX=0;
  gameState='playing';
  updateUI();
  document.getElementById('msg').textContent='';
  stopBGM(); playBGM();
}
function updateUI(){
  document.getElementById('score').textContent=String(score).padStart(6,'0');
  document.getElementById('coins').textContent=String(coins).padStart(2,'0');
  document.getElementById('lives').textContent=lives;
  if(score>highScore){
    highScore=score;
    try{ localStorage.setItem('marioHighScore',String(highScore)); }catch(e){}
  }
  document.getElementById('highscore').textContent=String(highScore).padStart(6,'0');
}

// ===== PHYSICS (simple full-footprint check) =====
function moveX(e){
  e.x += e.vx;
  if(e.vx===0) return;
  const top=Math.floor((e.y+2)/TW), bot=Math.floor((e.y+e.h-3)/TW);
  if(e.vx>0){
    const right=Math.floor((e.x+e.w)/TW);
    for(let row=top; row<=bot; row++){
      if(isSolid(getTile(right,row))){ e.x=right*TW-e.w; e.vx = e.isMario?0:-Math.abs(e.vx); return; }
    }
  } else {
    const left=Math.floor(e.x/TW);
    for(let row=top; row<=bot; row++){
      if(isSolid(getTile(left,row))){ e.x=(left+1)*TW; e.vx = e.isMario?0:Math.abs(e.vx); return; }
    }
  }
  if(e.x<0) e.x=0;
}
function moveY(e){
  e.y += e.vy;
  const left=Math.floor((e.x+2)/TW), right=Math.floor((e.x+e.w-3)/TW);
  if(e.vy>0){
    const bot=Math.floor((e.y+e.h)/TW);
    if(isSolid(getTile(left,bot)) || isSolid(getTile(right,bot))){
      e.y=bot*TW-e.h; e.vy=0; e.onGround=true; return;
    }
    e.onGround=false;
  } else if(e.vy<0){
    const top=Math.floor(e.y/TW);
    const hitL=isSolid(getTile(left,top)), hitR=isSolid(getTile(right,top));
    if(hitL||hitR){
      e.y=(top+1)*TW; e.vy=0.5;
      if(e.isMario){ if(hitL) hitBlock(left,top); if(hitR) hitBlock(right,top); }
    }
  } else {
    const bot=Math.floor((e.y+e.h+1)/TW);
    e.onGround = isSolid(getTile(left,bot)) || isSolid(getTile(right,bot));
  }
}
function hitBlock(tx,ty){
  const t=getTile(tx,ty);
  if(t===2){
    for(let i=0;i<6;i++) particles.push({x:tx*TW+8,y:ty*TW+8,vx:(Math.random()-0.5)*4,vy:-Math.random()*5-2,life:40,col:COL.brick});
    setTile(tx,ty,0); score+=50; updateUI(); blockSound();
  } else if(t===3){
    setTile(tx,ty,4); score+=100; coins++; updateUI();
    coinAnims.push({x:tx*TW,y:ty*TW-TW,life:40,vy:-2});
    coinSound();
  }
}

function updateMario(dt){
  if(mario.dead){ mario.y+=mario.vy; mario.vy+=0.35; return; }
  if(marioOnFlag) return;

  const maxSpeed = runHeld ? 3.2 : 2.0;
  const accel=0.4, decel=0.35;

  if(moveLeft && !moveRight){ mario.vx=Math.max(mario.vx-accel,-maxSpeed); mario.facing=-1; }
  else if(moveRight && !moveLeft){ mario.vx=Math.min(mario.vx+accel,maxSpeed); mario.facing=1; }
  else { if(mario.vx>0.05) mario.vx-=decel; else if(mario.vx<-0.05) mario.vx+=decel; else mario.vx=0; }

  if(wantJump) mario.jumpBuffer=8;
  wantJump=false;
  if(mario.onGround) mario.coyote=6;

  if(mario.jumpBuffer>0 && mario.coyote>0){
    mario.vy=-8.8; mario.onGround=false; mario.jumpBuffer=0; mario.coyote=0; jumpSound();
  }
  if(mario.jumpBuffer>0) mario.jumpBuffer-=dt;
  if(mario.coyote>0) mario.coyote-=dt;

  mario.vy+=0.45;
  if(mario.vy>12) mario.vy=12;

  mario.isMario=true;
  moveX(mario); moveY(mario);

  if(Math.abs(mario.vx)>0.1 && mario.onGround){
    mario.frameTimer+=Math.abs(mario.vx);
    if(mario.frameTimer>6){ mario.frameTimer=0; mario.frame=(mario.frame+1)%3; }
  } else { mario.frame=0; mario.frameTimer=0; }

  if(mario.invincible>0) mario.invincible-=dt;
  if(mario.y>H+100) killMario();

  if(!marioOnFlag && mario.x>(LEVEL_W-13)*TW && mario.x<(LEVEL_W-11)*TW && mario.y>4*TW){
    marioOnFlag=true; flagAnimating=true; stopBGM(); flagSound();
    score+=1000; updateUI(); winTimer=200;
  }
}

function killMario(){
  if(mario.invincible>0||mario.dead) return;
  mario.dead=true; mario.vy=-7;
  dieSound(); stopBGM();
  lives--; updateUI();
  setTimeout(()=>{
    if(lives<=0){ gameState='gameover'; document.getElementById('msg').textContent='GAME OVER — Click / Space to retry'; }
    else { buildLevel(); resetMario(); camX=0; gameState='playing'; playBGM(); }
  }, 1400);
}

function updateEnemies(dt){
  enemies.forEach(e=>{
    if(!e.alive) return;
    if(e.squished){ e.squishTimer-=dt; if(e.squishTimer<=0) e.alive=false; return; }
    const ex=e.x-camX;
    if(ex>W+150||ex<-250) return;
    e.vy+=0.4; if(e.vy>10) e.vy=10;
    e.isMario=false;
    moveX(e); moveY(e);
    e.frameTimer+=Math.abs(e.vx);
    if(e.frameTimer>6){ e.frameTimer=0; e.frame=1-e.frame; }
    if(e.y>H+100){ e.alive=false; return; }
    if(!mario.dead && mario.invincible<=0 && gameState==='playing'){
      const dx=(mario.x+mario.w/2)-(e.x+e.w/2), dy=(mario.y+mario.h/2)-(e.y+e.h/2);
      if(Math.abs(dx)<12 && Math.abs(dy)<13){
        if(mario.vy>0 && (mario.y+mario.h)<(e.y+9)){
          e.squished=true; e.squishTimer=20; mario.vy=-5; stompSound(); score+=100; updateUI();
        } else { killMario(); }
      }
    }
  });
}
function updateParticles(dt){
  particles=particles.filter(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.3;p.life-=dt;return p.life>0;});
  coinAnims=coinAnims.filter(cn=>{cn.y+=cn.vy;cn.vy+=0.2;cn.life-=dt;return cn.life>0;});
}
function updateCamera(){
  const target=mario.x-W*0.35;
  camX+=(target-camX)*0.15;
  if(camX<0) camX=0;
  const maxCam=LEVEL_W*TW-W;
  if(camX>maxCam) camX=maxCam;
}
function updateFlag(dt){
  if(flagAnimating){ flagY+=2.5; if(flagY>=12*TW) flagAnimating=false; }
  if(marioOnFlag){
    winTimer-=dt;
    mario.x=(LEVEL_W-12)*TW+2;
    mario.y=Math.min(mario.y+2.5,11*TW);
    if(winTimer<=0){ gameState='win'; document.getElementById('msg').textContent='🏆 YOU WIN! Click / Space to play again'; }
  }
}

// ===== DRAW =====
function drawMarioSprite(x,y,facing,frame,inv,dead){
  if(inv>0 && Math.floor(inv/4)%2===0) return;
  const px=Math.floor(x-camX), py=Math.floor(y);
  ctx.save();
  if(facing<0){ ctx.translate(px+14,py); ctx.scale(-1,1); } else ctx.translate(px,py);
  if(dead){ ctx.fillStyle=COL.mario; ctx.fillRect(2,2,10,10); ctx.fillStyle=COL.marioSkin; ctx.fillRect(3,4,8,6); ctx.restore(); return; }
  ctx.fillStyle=COL.marioPants; ctx.fillRect(2,9,10,7);
  ctx.fillStyle=COL.marioShoe;
  if(frame===1){ ctx.fillRect(1,14,5,3); ctx.fillRect(8,14,5,3); }
  else if(frame===2){ ctx.fillRect(2,14,5,3); ctx.fillRect(7,14,5,3); }
  else { ctx.fillRect(2,14,10,3); }
  ctx.fillStyle=COL.mario; ctx.fillRect(2,6,10,5);
  ctx.fillStyle=COL.marioSkin; ctx.fillRect(3,2,8,5); ctx.fillRect(3,7,3,2); ctx.fillRect(8,7,3,2);
  ctx.fillStyle=COL.mario; ctx.fillRect(2,1,10,3); ctx.fillRect(0,3,14,2);
  ctx.fillStyle='#000'; ctx.fillRect(5,3,2,2);
  ctx.fillStyle='#5C1800'; ctx.fillRect(3,6,8,2);
  ctx.restore();
}
function drawGoomba(e){
  const px=Math.floor(e.x-camX), py=Math.floor(e.y);
  if(px<-20||px>W+20) return;
  if(e.squished){ ctx.fillStyle='#C84C0C'; ctx.fillRect(px,py+10,14,4); return; }
  ctx.fillStyle='#C84C0C'; ctx.fillRect(px+1,py+6,12,8);
  ctx.fillStyle='#5C1800';
  if(e.frame===0){ ctx.fillRect(px,py+12,6,4); ctx.fillRect(px+8,py+12,6,4); }
  else{ ctx.fillRect(px+2,py+12,6,4); ctx.fillRect(px+6,py+12,6,4); }
  ctx.fillStyle='#C84C0C'; ctx.fillRect(px,py,14,8);
  ctx.fillStyle='#fff'; ctx.fillRect(px+2,py+2,4,3); ctx.fillRect(px+8,py+2,4,3);
  ctx.fillStyle='#000'; ctx.fillRect(px+4,py+3,2,2); ctx.fillRect(px+10,py+3,2,2);
  ctx.fillStyle='#5C1800'; ctx.fillRect(px+1,py+1,4,2); ctx.fillRect(px+9,py+1,4,2);
}
function drawKoopa(e){
  const px=Math.floor(e.x-camX), py=Math.floor(e.y);
  if(px<-20||px>W+20) return;
  ctx.fillStyle='#00A800'; ctx.fillRect(px+1,py+5,12,10);
  ctx.fillStyle='#FCFC00'; ctx.fillRect(px+3,py+7,8,6);
  ctx.fillStyle='#00D800'; ctx.fillRect(px+2,py,10,7);
  ctx.fillStyle='#fff'; ctx.fillRect(px+4,py+1,3,3);
  ctx.fillStyle='#000'; ctx.fillRect(px+5,py+2,2,2);
  ctx.fillStyle='#00A800'; ctx.fillRect(px,py+13,5,3); ctx.fillRect(px+9,py+13,5,3);
}
function drawTile(tx,ty){
  const type=getTile(tx,ty);
  if(type===0) return;
  const px=tx*TW-camX, py=ty*TW;
  if(px<-TW||px>W) return;
  if(type===1){ ctx.fillStyle=COL.groundTop; ctx.fillRect(px,py,TW,2); ctx.fillStyle=COL.ground; ctx.fillRect(px,py+2,TW,TW-2); }
  else if(type===2){
    ctx.fillStyle=COL.brickTop; ctx.fillRect(px,py,TW,2);
    ctx.fillStyle=COL.brick; ctx.fillRect(px,py+2,TW,TW-2);
    ctx.fillStyle='#A83000';
    ctx.fillRect(px,py+4,TW,1); ctx.fillRect(px,py+10,TW,1);
    ctx.fillRect(px+7,py,1,5); ctx.fillRect(px+3,py+5,1,5); ctx.fillRect(px+11,py+5,1,5); ctx.fillRect(px+7,py+10,1,6);
  } else if(type===3){
    ctx.fillStyle=COL.qblockTop; ctx.fillRect(px,py,TW,TW);
    ctx.fillStyle=COL.qblock; ctx.fillRect(px+1,py+1,TW-2,TW-2);
    ctx.fillStyle='#fff';
    ctx.fillRect(px+5,py+3,4,2);ctx.fillRect(px+4,py+5,2,2);ctx.fillRect(px+5,py+9,4,2);ctx.fillRect(px+5,py+7,4,2);
  } else if(type===4){ ctx.fillStyle='#A83000'; ctx.fillRect(px,py,TW,TW); ctx.fillStyle='#C84C0C'; ctx.fillRect(px+1,py+1,TW-2,TW-2); }
  else if(type===5){ ctx.fillStyle=COL.pipeLight; ctx.fillRect(px,py,TW,TW); ctx.fillStyle=COL.pipe; ctx.fillRect(px+2,py+2,TW-2,TW-2); }
  else if(type===6){ ctx.fillStyle=COL.pipe; ctx.fillRect(px,py,TW,TW); }
  else if(type===7){ ctx.fillStyle=COL.pipeLight; ctx.fillRect(px,py,TW-2,TW); ctx.fillStyle=COL.pipe; ctx.fillRect(px+TW-2,py,2,TW); }
  else if(type===8){ ctx.fillStyle=COL.pipe; ctx.fillRect(px,py,TW,TW); }
}
function drawHill(wx,wy,r){
  const x=wx-camX*0.5;
  if(x<-r-50||x>W+r+50) return;
  ctx.fillStyle='#00A800'; ctx.beginPath(); ctx.arc(x,wy,r,Math.PI,0); ctx.fill();
  ctx.fillStyle='#00C800'; ctx.beginPath(); ctx.arc(x,wy,r-4,Math.PI,0); ctx.fill();
}
function drawCloud(wx,wy){
  const x=wx-camX*0.3;
  if(x<-100||x>W+100) return;
  ctx.fillStyle='#fff';
  ctx.fillRect(x+10,wy+10,30,15); ctx.fillRect(x,wy+15,50,15);
  ctx.fillRect(x+5,wy+5,20,15); ctx.fillRect(x+25,wy+5,20,15);
}
function drawBackground(){
  ctx.fillStyle=COL.sky; ctx.fillRect(0,0,W,H);
  drawHill(50,200,80); drawHill(280,200,55); drawHill(460,200,70); drawHill(650,200,55);
  drawHill(850,200,80); drawHill(1050,200,55); drawHill(1250,200,70);
  drawCloud(80,60); drawCloud(320,80); drawCloud(540,55); drawCloud(760,70);
  drawCloud(980,65); drawCloud(1200,75); drawCloud(1420,60);
}
function drawFlag(){
  const fx=(LEVEL_W-12)*TW-camX;
  if(fx<-20||fx>W) return;
  ctx.fillStyle='#888'; ctx.fillRect(fx+6,5*TW,2,8*TW);
  ctx.fillStyle='#0f0'; ctx.fillRect(fx+8,flagY,12,9);
  ctx.fillStyle='#00a800'; ctx.fillRect(fx+8,flagY+1,12,4);
}
function drawAll(){
  ctx.clearRect(0,0,W,H);
  drawBackground();
  const startTx=Math.max(0,Math.floor(camX/TW)-1);
  const endTx=Math.min(LEVEL_W,startTx+Math.ceil(W/TW)+2);
  for(let ty=0;ty<LEVEL_H;ty++) for(let tx=startTx;tx<endTx;tx++) drawTile(tx,ty);
  drawFlag();
  particles.forEach(p=>{ ctx.fillStyle=p.col; ctx.fillRect(Math.floor(p.x-camX),Math.floor(p.y),4,4); });
  coinAnims.forEach(cn=>{
    ctx.fillStyle=COL.coin; ctx.fillRect(Math.floor(cn.x-camX+4),Math.floor(cn.y),8,8);
    ctx.fillStyle='#FCFC00'; ctx.fillRect(Math.floor(cn.x-camX+5),Math.floor(cn.y+1),6,6);
  });
  enemies.forEach(e=>{ if(e.alive){ if(e.type===0) drawGoomba(e); else drawKoopa(e); } });
  drawMarioSprite(mario.x, mario.y, mario.facing, mario.frame, mario.invincible, mario.dead);
}
function drawTitle(){
  ctx.fillStyle=COL.sky; ctx.fillRect(0,0,W,H);
  drawHill(150,250,90); drawHill(450,250,70); drawHill(650,250,90);
  ctx.fillStyle='rgba(0,0,0,0.75)'; ctx.fillRect(80,90,W-160,220);
  ctx.fillStyle='#FCA044'; ctx.font='bold 38px monospace'; ctx.textAlign='center';
  ctx.fillText('SUPER MARIO BROS', W/2, 150);
  ctx.fillStyle='#fff'; ctx.font='14px monospace';
  ctx.fillText('1990 CLASSIC EDITION', W/2, 180);
  ctx.fillStyle='#ff4'; ctx.font='bold 18px monospace';
  if(Math.floor(Date.now()/400)%2===0) ctx.fillText('CLICK SCREEN TO START', W/2, 240);
  ctx.fillStyle='#aaa'; ctx.font='12px monospace';
  ctx.fillText('← → move   CLICK/SPACE jump   SHIFT run', W/2, 280);
  ctx.textAlign='left';
}

// ===== LOOP =====
let last=0;
function loop(ts){
  const dt=Math.min((ts-last)/16.67,3); last=ts;
  if(gameState==='title'){ drawTitle(); }
  else if(gameState==='playing'){
    updateMario(dt); updateEnemies(dt); updateParticles(dt); updateCamera(); updateFlag(dt);
    drawAll();
  } else { drawAll(); }
  requestAnimationFrame(loop);
}
resetMario();
drawTitle();
requestAnimationFrame(loop);
</script>
